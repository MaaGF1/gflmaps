name: Deploy to gh-pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write # 必须具有 write 权限才能向 gh-pages 分支推送代码

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Chinese Translation Modifications
        run: |
          # 1. 替换默认语言变量为 cn
          sed -i 's/langCode: "en"/langCode: "cn"/' main.js
          
          # 2. 修复原作者远端数据请求路径错误 (将动态变量 ${config.langCode} 强行替换为 ch)
          sed -i 's/${config.langCode}\/text\/table/ch\/text\/table/g' main.js
          
          # 3. 添加时间戳防缓存（极力建议保留，防止浏览器死活不刷新）
          TIMESTAMP=$(date +%s)
          sed -i "s/main\.js/main.js?v=$TIMESTAMP/g" index.html
          sed -i "s/ui_text\.json/ui_text.json?v=$TIMESTAMP/g" main.js
          sed -i "s/instructions\.html/instructions.html?v=$TIMESTAMP/g" main.js
          
          echo "✅ 文件替换完成"

      # 将当前目录的所有文件推送到 gh-pages 分支
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true # 每次覆盖都作为一个全新的孤儿分支，防止历史提交越堆越大
          commit_message: "Auto-deploy to gh-pages with CN translation"