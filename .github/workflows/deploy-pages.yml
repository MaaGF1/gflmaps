name: Deploy Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CN Translation and Bust Cache
        run: |
          # 1. Switch local configuration to Chinese (cn)
          sed -i 's/langCode: "en"/langCode: "cn"/' main.js
          
          # 2. URL that requests remote data
          sed -i 's/${config.langCode}\/text\/table/ch\/text\/table/g' main.js
          
          # 3. Add the hash value of the current commit as the version number to the referenced file.
          sed -i "s/main\.js/main.js?v=${GITHUB_SHA::8}/g" index.html
          sed -i "s/ui_text\.json/ui_text.json?v=${GITHUB_SHA::8}/g" main.js
          sed -i "s/instructions\.html/instructions.html?v=${GITHUB_SHA::8}/g" main.js

          echo "=== Replacement Verification ==="
          grep "langCode:" main.js
          grep "ui_text.json?v=" main.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4